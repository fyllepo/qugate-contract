# Branch: main receives merged PRs only.
# Feature branches use feature/YYYY-MM-DD-Name convention per qubic/core contributing.md

name: CI

on:
  push:
    branches: [main, 'feature/**']
  pull_request:

jobs:
  # ── Contract verification ──────────────────────────────────────────────
  contract-verify:
    runs-on: ubuntu-latest
    name: Verify QuGate.h compliance
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Contract verify
        uses: Franziska-Mueller/qubic-contract-verify@v0.3.0-beta
        # Known limitation: v0.3.0-beta does not support template syntax
        # (OracleNotificationInput<OI::Price>) used by the Qubic oracle API.
        # Allow failure until verifier supports oracle contracts.
        continue-on-error: true
        with:
          filepaths: 'QuGate.h'

  # ── Style lint (best-effort) ───────────────────────────────────────────
  # Best-effort brace-style check.  May produce false positives on
  # multi-line macros or string literals — treat warnings accordingly.
  lint:
    runs-on: ubuntu-latest
    name: Style lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Check brace style
        run: |
          status=0

          # Same-line opening braces:  ) {  or  ) { //
          if grep -rn --include='*.h' --include='*.cpp' -P '\)\s*\{' .; then
            echo "::warning::Found same-line opening braces (expected brace on next line)"
            status=1
          fi

          # } else {  on one line
          if grep -rn --include='*.h' --include='*.cpp' -P '\}\s*else' .; then
            echo "::warning::Found '} else' on same line (expected else on its own line)"
            status=1
          fi

          if [ "$status" -ne 0 ]; then
            echo "Style issues detected (see above)."
            exit 1
          fi
          echo "Brace style OK"

  # ── Integration tests (require running testnet node) ───────────────────
  # These tests need qubic-cli, identity_tool, and a node at 127.0.0.1:41841.
  # They are skipped in CI — run locally against the testnet on Neutron-01.
  test-integration:
    runs-on: ubuntu-latest
    name: Integration tests (testnet)
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install pytest requests
      - name: Run tests (skip if no node)
        run: |
          # All Python tests require a live testnet node.
          # In CI, no node is available — verify imports work, then skip.
          python3 -c "
          import sys, requests
          try:
              r = requests.get('http://127.0.0.1:41841/live/v1/tick-info', timeout=2)
              if r.status_code == 200:
                  sys.exit(0)  # Node available — run tests
          except Exception:
              pass
          print('::notice::Testnet node not available — skipping integration tests')
          sys.exit(2)  # Special exit code = skip
          " && pytest tests/ --ignore=tests/test_testnet.py -v --tb=short || {
            code=$?
            if [ "$code" -eq 2 ]; then
              echo "Integration tests skipped (no node)"
              exit 0
            fi
            exit "$code"
          }
